Screens:
  Production_Start:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(varShowPinOverlay, false);
        Set(varPinCode, "")
    Children:
      - ProductionStart_1:
          Control: CanvasComponent
          ComponentName: ProductionStart
          Properties:
            Height: =614
            JobOrder: =varCurrentWorkOrder.Title
            LineName: =varCurrentWorkOrder.LineName
            LineNumber: =varCurrentWorkOrder.LineNumber
            OnBackPressed: =Navigate(OpAssignment, ScreenTransition.None)
            OnLiveProductionPressed: |-
              =Set(varActiveSession,
                  Patch(
                      'Active Sessions',
                      Defaults('Active Sessions'),
                      {
                          Title:                 varCurrentWorkOrder.Title & "",
                          WorkOrderID:           varCurrentWorkOrder.Title & "",
                          ProductName:           varCurrentProduct.Title & "",
                          Batch:                 varCurrentWorkOrder.Batch & "",
                          LineNumber:            varCurrentWorkOrder.LineNumber & "",
                          PreProductionOperator: varOperators.PreProd & "",
                          ApprovedBy:            varOperators.ApprovedBy & "",
                          CleaningBottle:        varOperators.Cleaning & "",
                          SrtBoxPacker:          varOperators.SrtPacker & "",
                          Cartoniser:            varOperators.Cartoniser & "",
                          Filler:                varOperators.Filler & "",
                          Labeller:              varOperators.Labeller & "",
                          SetupStartTime:        varSetupTime & "",
                          ProductionStartTime:   Text(Now(), "dd/mm/yyyy hh:mm"),
                          LastModified:          Text(Now(), "dd/mm/yyyy hh:mm"),
                          UnitsProduced:         0,
                          Rejects:               0,
                          UnitsWeighed:          0,
                          TotalDowntime_min:     0,
                          WeighCheckCount:       0,
                          Status:                {Value: "In Progress"}
                      }
                  )
              );
              Navigate(LiveProd, ScreenTransition.None)
            OnSetupStartPressed: |-
              =Set(varSetupTime, Text(Now(), "dd/mm/yyyy hh:mm"));
              Navigate(Setup_in_Progress, ScreenTransition.None)
            OperatorName: =varOperators.PreProd
            SetupTimestamp: =varSetupTime
            StaffIds: =Concat(colStaff, Id & "|" & Title & ",")
            Width: =1024
