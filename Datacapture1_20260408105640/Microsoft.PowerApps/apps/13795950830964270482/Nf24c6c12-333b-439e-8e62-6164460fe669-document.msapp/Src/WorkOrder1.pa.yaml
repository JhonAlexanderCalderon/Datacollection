Screens:
  WorkOrder1:
    Properties:
      Fill: =MainBackground
      ImagePosition: =ImagePosition.Center
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(varBatchText, "")
    Children:
      - WorkOrderScreen1_1:
          Control: CanvasComponent
          ComponentName: WorkOrderScreen1
          Properties:
            AdditionalInfo: =varCurrentWorkOrder.Notes
            Batch: =varCurrentWorkOrder.Batch
            Expiry: =varCurrentWorkOrder.Expiry
            Height: =614
            JobOrder: =varCurrentWorkOrder.Title
            NetFillWeight: =varCurrentProduct.NetFillWeight_g
            NumberOfPallets: =Text(varCurrentWorkOrder.NumberOfPallets)
            OnCancelPressed: =Navigate(Numbers, ScreenTransition.None)
            OnNextPressed: =Navigate(WorkOrder2, ScreenTransition.None)
            PalletQty: =Text(varCurrentProduct.PalletQty)
            ProductName: =varCurrentProduct.ProductName
            QtyRequired: =Text(varCurrentWorkOrder.QtyRequired)
            Srt: =varCurrentProduct.Srt
            Tube: =varCurrentProduct.Tube
            Width: =1024
      - Status_5:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(83, 180, 204, 0.47)
            Height: =0
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutJustifyContent: =LayoutJustifyContent.Center
            PaddingLeft: =10
            PaddingRight: =7.50
            PaddingTop: =0.75
            Visible: =false
            Width: =App.Width
            X: =0.00
          Children:
            - Image1_5:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =Parent.Height
                  Image: ='concept (1) (1) (1)'
                  ImagePosition: =ImagePosition.Stretch
                  PaddingBottom: =2
                  PaddingRight: =0.00
                  PaddingTop: =2
                  Visible: =false
                  Width: =149.93
                  X: =10.00
            - Timer1_5:
                Control: Timer@2.1.0
                Properties:
                  AutoStart: =true
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =RGBA(255, 255, 255, 1)
                  DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
                  DisabledColor: =ColorFade(Self.Fill, 90%)
                  DisabledFill: =ColorFade(Self.Fill, 70%)
                  Duration: =1000
                  Fill: =RGBA(0, 0, 0, 0)
                  Font: =Font.'Open Sans'
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                  OnTimerEnd: =Set(CurrentTime, Now())
                  PaddingRight: =3.75
                  PaddingTop: =3.75
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Repeat: =true
                  Size: =9.75
                  Visible: =false
                  Width: =119.94
                  X: =0.00
            - ClockScreen_5:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  DisplayMode: =DisplayMode.View
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Bold
                  PaddingRight: =3.75
                  PaddingTop: =3.75
                  Size: =15
                  Text: =Text(CurrentTime, DateTimeFormat.LongTime)
                  Visible: =false
                  Width: =112.45
                  X: =904.00
            - Centre_5:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =Parent.Height
                  LayoutMinHeight: =0
                  LayoutMinWidth: =0
                  PaddingRight: =0.00
                  PaddingTop: =0.00
                  Width: =744.00
                  X: =160.00
                Children:
                  - HtmlText1_2:
                      Control: HtmlViewer@2.1.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Color: =RGBA(252, 250, 250, 1)
                        DisabledBorderColor: =RGBA(0, 0, 0, 0)
                        DisabledFill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        Height: =42
                        HtmlText: =
                        Size: =15
                        Width: =178
                        X: =304
                        Y: =4
