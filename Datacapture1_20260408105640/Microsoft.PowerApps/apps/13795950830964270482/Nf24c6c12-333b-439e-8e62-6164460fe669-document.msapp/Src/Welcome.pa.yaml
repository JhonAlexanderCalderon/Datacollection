Screens:
  Welcome:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - cont_root_ws_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(26, 26, 26, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =6
            Width: =Parent.Width
          Children:
            - cont_header_ws_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(22, 75, 80, 1)
                  FillPortions: =0
                  Height: =47
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =0
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_appname_ws_1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =47
                        Size: =18
                        Text: ="Production Line"
                  - lbl_linename_ws_1:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        Color: =RGBA(160, 210, 210, 1)
                        Font: =Font.'Open Sans'
                        Height: =47
                        Size: =12
                        Text: =varCurrentWorkOrder.LineNumber & " — " & varCurrentWorkOrder.LineName
                        Width: =280
            - cont_sep_active_ws_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(36, 36, 36, 1)
                  FillPortions: =0
                  Height: =36
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =0
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_active_title_ws_1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(160, 210, 210, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        Size: =11
                        Text: ="ACTIVE JOBS"
                  - lbl_active_count_ws_1:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        Color: =RGBA(120, 120, 120, 1)
                        Font: =Font.'Open Sans'
                        Height: =36
                        Size: =11
                        Text: =Text(CountRows(Filter(colActiveSessions, Status.Value = "In Progress" || Status.Value = "Paused"))) & " session(s)"
                        Width: =160
            - gal_active_ws_1:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  FillPortions: =0
                  Height: =320
                  Items: =Filter(colActiveSessions, Status.Value = "In Progress" || Status.Value = "Paused")
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  TemplateSize: =100
                  Width: =Parent.Width
                Children:
                  - cont_row_gal_ws_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =If(Mod(ThisItem.ID, 2) = 0, RGBA(30, 30, 30, 1), RGBA(36, 36, 36, 1))
                        Height: =100
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        PaddingBottom: =8
                        PaddingLeft: =16
                        PaddingRight: =8
                        PaddingTop: =8
                        Width: =Parent.Width
                      Children:
                        - cont_status_dot_ws_1:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              DropShadow: =DropShadow.None
                              FillPortions: =0
                              Height: =84
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              Width: =30
                            Children:
                              - lbl_dot_ws_1:
                                  Control: Label@2.5.1
                                  Properties:
                                    Align: =Align.Center
                                    Color: =If(ThisItem.Status.Value = "In Progress", RGBA(46, 182, 143, 1), RGBA(200, 140, 0, 1))
                                    Font: =Font.'Open Sans'
                                    FontWeight: =FontWeight.Bold
                                    Height: =84
                                    Size: =18
                                    Text: ="●"
                                    Width: =30
                        - cont_job_info_ws_1:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              DropShadow: =DropShadow.None
                              Height: =84
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                            Children:
                              - lbl_wo_ws_1:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(83, 178, 200, 1)
                                    Font: =Font.'Open Sans'
                                    FontWeight: =FontWeight.Bold
                                    Height: =26
                                    Size: =14
                                    Text: =ThisItem.Title & "  —  " & ThisItem.ProductName
                                    Width: =Parent.Width
                              - lbl_units_ws_1:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(160, 160, 160, 1)
                                    Font: =Font.'Open Sans'
                                    Height: =22
                                    Size: =11
                                    Text: =Text(ThisItem.UnitsProduced) & " units produced  ·  " & Text(ThisItem.Rejects) & " rejects"
                                    Width: =Parent.Width
                              - lbl_status_ws_1:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =If(ThisItem.Status.Value = "In Progress", RGBA(46, 182, 143, 1), RGBA(200, 140, 0, 1))
                                    Font: =Font.'Open Sans'
                                    FontWeight: =FontWeight.Semibold
                                    Height: =22
                                    Size: =11
                                    Text: =ThisItem.Status.Value & "  ·  Started " & ThisItem.ProductionStartTime
                                    Width: =Parent.Width
                        - btn_resume_gal_ws_1:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderThickness: =0
                              Color: =RGBA(255, 255, 255, 1)
                              Fill: =If(ThisItem.Status.Value = "In Progress", RGBA(22, 75, 80, 1), RGBA(200, 140, 0, 1))
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =60
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =If(ThisItem.Status.Value = "In Progress", ColorFade(RGBA(22, 75, 80, 1), -20%), ColorFade(RGBA(200, 140, 0, 1), -20%))
                              OnSelect: |-
                                =Set(varActiveSession, ThisItem);
                                Set(varJobID, ThisItem.Title & "");
                                Set(varUnitsTotal, Value(ThisItem.UnitsProduced));
                                Set(varRejectsTotal, Value(ThisItem.Rejects));
                                Set(varTotalDowntime, Value(ThisItem.TotalDowntime_min));
                                Set(varCurrentWorkOrder, LookUp(colWorkOrders, Title = ThisItem.Title & ""));
                                Set(varCurrentProduct, LookUp(colProducts, ProductName = ThisItem.ProductName & ""));
                                Navigate(LiveProd, ScreenTransition.None)
                              PressedFill: =If(ThisItem.Status.Value = "In Progress", ColorFade(RGBA(22, 75, 80, 1), -35%), ColorFade(RGBA(200, 140, 0, 1), -35%))
                              Size: =14
                              Text: =If(ThisItem.Status.Value = "In Progress", "RESUME", "RESUME")
                              Width: =120
            - cont_divider_ws_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(45, 45, 45, 1)
                  FillPortions: =0
                  Height: =6
                  LayoutDirection: =LayoutDirection.Horizontal
                  Width: =Parent.Width
            - cont_sep_new_ws_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(36, 36, 36, 1)
                  FillPortions: =0
                  Height: =36
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =0
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_new_title_ws_1:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(120, 120, 120, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        Size: =11
                        Text: ="NEW JOB"
            - cont_btn_new_ws_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =139
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                  Width: =Parent.Width
                Children:
                  - btn_newjob_ws_1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(46, 182, 143, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(46, 182, 143, 1), -20%)
                        OnSelect: = Navigate(Numbers, ScreenTransition.None)
                        PressedFill: =ColorFade(RGBA(46, 182, 143, 1), -35%)
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        Size: =22
                        Text: ="＋  START NEW JOB"
