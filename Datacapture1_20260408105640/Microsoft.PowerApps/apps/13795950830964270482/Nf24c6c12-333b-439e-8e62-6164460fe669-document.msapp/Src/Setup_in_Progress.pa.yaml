Screens:
  Setup_in_Progress:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =// OnVisible:
        // nada — solo muestra info de varSetupTime

        // Botón BACK o "READY TO START":
        Navigate(Production_Start, ScreenTransition.None)
    Children:
      - SetupInProgress_1:
          Control: CanvasComponent
          ComponentName: SetupInProgress
          Properties:
            Batch: =varCurrentWorkOrder.Batch
            Height: =614
            JobOrder: =varCurrentWorkOrder.Title
            LineNumber: =varCurrentWorkOrder.LineNumber
            NetFillWeight: =varCurrentProduct.NetFillWeight_g
            OnCancelSetupPressed: |-
              =Set(varSetupTime, "");
                                      Navigate(Production_Start, ScreenTransition.None)
            OnReportFailurePressed: |
              =Navigate(Failure_Type, ScreenTransition.None)
            OnSetupCompletePressed: =Navigate(Production_Start, ScreenTransition.None)
            OnViewJobInfoPressed: =Navigate(WorkOrder1, ScreenTransition.None)
            ProductName: =varCurrentProduct.Title
            QtyRequired: =Text(varCurrentWorkOrder.QtyRequired) & " Units"
            SetupStartTime: =varSetupTime
            Tube: =varCurrentProduct.Tube
            Width: =1024
