ComponentDefinitions:
  LogWeighSample:
    DefinitionType: CanvasComponent
    CustomProperties:
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Job order number
        DataType: Text
        Default: ="2GE0009"
      LineNumber:
        PropertyKind: Input
        DisplayName: LineNumber
        Description: Production line number
        DataType: Text
        Default: ="Line 2"
      OnCancelPressed:
        PropertyKind: Event
        DisplayName: OnCancelPressed
        Description: Fires when CANCEL is pressed
        ReturnType: Boolean
        Default: =false
      OnConfirmPressed:
        PropertyKind: Event
        DisplayName: OnConfirmPressed
        Description: Fires when CONFIRM WEIGH is pressed - read varWeighInput for the value
        ReturnType: Boolean
        Default: =false
      OnSelectOperatorPressed:
        PropertyKind: Event
        DisplayName: OnSelectOperatorPressed
        Description: Fires when SELECT OPERATOR is pressed
        ReturnType: Boolean
        Default: =false
      SelectedOperator:
        PropertyKind: Input
        DisplayName: SelectedOperator
        Description: Name of operator currently performing the weigh check
        DataType: Text
        Default: ="Not selected"
      WeightMax:
        PropertyKind: Input
        DisplayName: WeightMax
        Description: Maximum acceptable weight
        DataType: Text
        Default: ="118g"
      WeightMin:
        PropertyKind: Input
        DisplayName: WeightMin
        Description: Minimum acceptable weight
        DataType: Text
        Default: ="115g"
