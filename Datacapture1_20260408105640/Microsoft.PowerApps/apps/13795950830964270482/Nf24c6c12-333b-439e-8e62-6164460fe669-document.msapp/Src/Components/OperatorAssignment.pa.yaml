        DisplayName: OnBackPressed
        Description: Se dispara al presionar BACK
        ReturnType: Boolean
        Default: =false
      OnConfirmPressed:
        PropertyKind: Event
        DisplayName: OnConfirmPressed
        Description: Se dispara al presionar CONFIRM PRE-PRODUCTION CHECKLIST
        ReturnType: Boolean
        Default: =false
      PreProductionOperator:
        PropertyKind: Output
        DisplayName: PreProductionOperator
        Description: Operario asignado a pre-production checks
        DataType: Text
      SrtBoxPacker:
        PropertyKind: Output
        DisplayName: SrtBoxPacker
        Description: Operario asignado a SRT Box Packer
        DataType: Text
      StaffList:
        PropertyKind: Input
        DisplayName: StaffList
        Description: Lista de operarios separada por comas
        DataType: Text
        Default: ="Sarah Truckle,Deano Roberts,Chelsea Turner,Declan Borger,Kyle Peters,Luke Page"
      SupervisorList:
        PropertyKind: Input
        DisplayName: SupervisorList
        Description: Lista de supervisores separada por comas
        DataType: Text
        Default: ="Ashlee Stott,Robert Sushames"
