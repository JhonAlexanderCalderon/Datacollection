        PropertyKind: Input
        DisplayName: LineName
        Description: Nombre de la linea de produccion
        DataType: Text
        Default: ="Cold Fill Line"
      LineNumber:
        PropertyKind: Input
        DisplayName: LineNumber
        Description: Numero de la linea
        DataType: Text
        Default: ="Line 2"
