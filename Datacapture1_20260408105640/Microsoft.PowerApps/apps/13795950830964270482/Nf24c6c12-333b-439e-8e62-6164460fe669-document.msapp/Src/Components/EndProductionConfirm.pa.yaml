ComponentDefinitions:
  EndProductionConfirm:
    DefinitionType: CanvasComponent
    CustomProperties:
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Numero de orden de trabajo
        DataType: Text
        Default: ="2GE0009"
      LineNumber:
        PropertyKind: Input
        DisplayName: LineNumber
        Description: Numero de la linea
        DataType: Text
        Default: ="Line 2"
      OnCancelPressed:
        PropertyKind: Event
        DisplayName: OnCancelPressed
        Description: Se dispara al presionar CANCEL - volver a Live Production
        ReturnType: Boolean
        Default: =false
      OnEndJobPressed:
        PropertyKind: Event
        DisplayName: OnEndJobPressed
        Description: Se dispara al confirmar END JOB - navegar a Summary
        ReturnType: Boolean
        Default: =false
      OnPauseJobPressed:
        PropertyKind: Event
        DisplayName: OnPauseJobPressed
        Description: Se dispara al presionar PAUSE JOB - guardar estado y volver a Numbers
        ReturnType: Boolean
        Default: =false
      ProductName:
        PropertyKind: Input
        DisplayName: ProductName
        Description: Nombre del producto
        DataType: Text
        Default: ="No Nasties Hair Paste"
      ProductionStartTime:
        PropertyKind: Input
        DisplayName: ProductionStartTime
        Description: Hora de inicio de produccion
        DataType: Text
        Default: ="14:32"
      Rejects:
        PropertyKind: Input
        DisplayName: Rejects
        Description: Total de rejects al momento
        DataType: Text
        Default: ="12"
      UnitsProduced:
        PropertyKind: Input
        DisplayName: UnitsProduced
        Description: Total de unidades producidas al momento
        DataType: Text
        Default: ="4820"
    Properties:
      Height: =614
      Width: =1024
    Children:
      - cont_root_ep:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(26, 26, 26, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =6
            Width: =Parent.Width
          Children:
            - cont_header_ep:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(22, 75, 80, 1)
                  FillPortions: =0
                  Height: =47
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =0
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_title_ep:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =47
                        Size: =16
                        Text: =EndProductionConfirm.LineNumber & " — " & EndProductionConfirm.JobOrder
                  - lbl_stage_ep:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        Color: =RGBA(160, 210, 210, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =47
                        Size: =11
                        Text: ="END PRODUCTION"
                        Width: =180
            - cont_warning_ep:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(100, 20, 20, 1)
                  FillPortions: =0
                  Height: =180
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =20
                  PaddingLeft: =40
                  PaddingRight: =40
                  PaddingTop: =20
                  Width: =Parent.Width
                Children:
                  - SVG:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 1)
                        Height: =50
                        Image: ="data:image/svg+xml;utf8, "&EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='40px' height='40px' viewBox='0 0 20 20' fill='#ffffff' stroke='none' stroke-width='0' stroke-linecap='round' stroke-linejoin='round'><path d='M9.56 3.26a.5.5 0 0 1 .88 0l6.5 12a.5.5 0 0 1-.44.74h-13a.5.5 0 0 1-.44-.74l6.5-12Zm1.76-.47a1.5 1.5 0 0 0-2.64 0l-6.5 12A1.5 1.5 0 0 0 3.5 17h13a1.5 1.5 0 0 0 1.32-2.21l-6.5-12ZM10.5 7.5a.5.5 0 0 0-1 0v4a.5.5 0 1 0 1 0v-4Zm.25 6.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z'/></svg>")
                        Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        X: =114
                        Y: =Parent.Height/2 - Self.Height/2
                  - lbl_warning_title_ep:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(255, 255, 255, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =52
                        Size: =30
                        Text: ="END THIS JOB?"
                        Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - lbl_warning_sub_ep:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(255, 180, 180, 1)
                        Font: =Font.'Open Sans'
                        Height: =30
                        Text: ="This will close the job order and move to production summary"
                        Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_jobinfo_ep:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =130
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  Width: =Parent.Width
                Children:
                  - cont_info_product_ep:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        FillPortions: =2
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =10
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =10
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_product_key_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =20
                              Size: =11
                              Text: ="PRODUCT"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_product_val_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(230, 230, 230, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =90
                              Size: =20
                              Text: =EndProductionConfirm.ProductName
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_info_units_ep:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =10
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =10
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_units_key_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =20
                              Size: =11
                              Text: ="UNITS"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_units_val_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(83, 178, 200, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =90
                              Size: =32
                              Text: =EndProductionConfirm.UnitsProduced
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_info_rejects_ep:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(50, 25, 25, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =10
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =10
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_rejects_key_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(180, 100, 100, 1)
                              Font: =Font.'Open Sans'
                              Height: =20
                              Size: =11
                              Text: ="REJECTS"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_rejects_val_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(220, 80, 80, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =90
                              Size: =32
                              Text: =EndProductionConfirm.Rejects
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_info_time_ep:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =10
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =10
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_time_key_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =20
                              Size: =11
                              Text: ="STARTED"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_time_val_ep:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(230, 230, 230, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =90
                              Size: =26
                              Text: =EndProductionConfirm.ProductionStartTime
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_spacer_ep:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =103
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  PaddingLeft: =40
                  PaddingRight: =40
                  Width: =Parent.Width
                Children:
                  - lbl_spacer_hint_ep:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =RGBA(80, 80, 80, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        Height: =103
                        Text: ="PAUSE saves progress and returns to job selection. END closes the job permanently and generates the production summary."
            - cont_actions_ep:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =130
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                  Width: =Parent.Width
                Children:
                  - btn_cancel_ep:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(22, 75, 80, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(22, 75, 80, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(22, 75, 80, 1), -20%)
                        OnSelect: =EndProductionConfirm.OnCancelPressed()
                        PressedFill: =ColorFade(RGBA(22, 75, 80, 1), -35%)
                        Size: =18
                        Text: ="CANCEL"
                  - btn_pausejob_ep:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(20, 50, 90, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(20, 50, 90, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(20, 50, 90, 1), -20%)
                        OnSelect: =EndProductionConfirm.OnPauseJobPressed()
                        PressedFill: =ColorFade(RGBA(20, 50, 90, 1), -35%)
                        Size: =18
                        Text: ="⏸ PAUSE JOB"
                  - btn_endjob_ep:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(160, 30, 30, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(160, 30, 30, 1)
                        FillPortions: =2
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(160, 30, 30, 1), -20%)
                        OnSelect: =EndProductionConfirm.OnEndJobPressed()
                        PressedFill: =ColorFade(RGBA(160, 30, 30, 1), -35%)
                        Size: =20
                        Text: ="END JOB"
