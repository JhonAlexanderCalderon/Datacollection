ComponentDefinitions:
  WorkOrderScreen1:
    DefinitionType: CanvasComponent
    CustomProperties:
      AdditionalInfo:
        PropertyKind: Input
        DisplayName: AdditionalInfo
        Description: Informacion adicional
        DataType: Text
        Default: ="Batch and Expiry to be crimped into tube seal - format C01 EXP01/11"
      Batch:
        PropertyKind: Input
        DisplayName: Batch
        Description: Codigo de batch
        DataType: Text
        Default: ="C1349 / C02"
      Expiry:
        PropertyKind: Input
        DisplayName: Expiry
        Description: Estado de vencimiento
        DataType: Text
        Default: ="REQUIRED"
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Numero de orden de trabajo
        DataType: Text
        Default: ="2GE0009"
      NetFillWeight:
        PropertyKind: Input
        DisplayName: NetFillWeight
        Description: Peso neto de llenado
        DataType: Text
        Default: ="115g - 118g"
      NumberOfPallets:
        PropertyKind: Input
        DisplayName: NumberOfPallets
        Description: Numero de pallets requeridos
        DataType: Text
        Default: ="4"
      OnCancelPressed:
        PropertyKind: Event
        DisplayName: OnCancelPressed
        Description: Se dispara al presionar CANCEL - conectar con Navigate en la pantalla
        ReturnType: Boolean
        Default: =false
      OnNextPressed:
        PropertyKind: Event
        DisplayName: OnNextPressed
        Description: Se dispara al presionar NEXT - conectar con Navigate en la pantalla
        ReturnType: Boolean
        Default: =false
      PalletQty:
        PropertyKind: Input
        DisplayName: PalletQty
        Description: Cantidad de pallets
        DataType: Text
        Default: ="24"
      ProductName:
        PropertyKind: Input
        DisplayName: ProductName
        Description: Nombre del producto
        DataType: Text
        Default: ="No Nasties Hair Paste"
      QtyRequired:
        PropertyKind: Input
        DisplayName: QtyRequired
        Description: Cantidad requerida
        DataType: Text
        Default: ="5000 Units"
      Srt:
        PropertyKind: Input
        DisplayName: Srt
        Description: Informacion SRT
        DataType: Text
        Default: ="Yes - 3XGE0002"
      Tube:
        PropertyKind: Input
        DisplayName: Tube
        Description: Codigo de tubo
        DataType: Text
        Default: ="3TGE0003 - 125ml Tube"
