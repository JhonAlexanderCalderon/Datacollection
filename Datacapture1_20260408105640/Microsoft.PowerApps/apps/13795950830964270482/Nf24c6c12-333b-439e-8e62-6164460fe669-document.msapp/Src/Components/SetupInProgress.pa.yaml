ComponentDefinitions:
  SetupInProgress:
    DefinitionType: CanvasComponent
    CustomProperties:
      Batch:
        PropertyKind: Input
        DisplayName: Batch
        Description: Batch code
        DataType: Text
        Default: =varCurrentWorkOrder.Batch
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Job order number
        DataType: Text
        Default: =varCurrentWorkOrder.Title
      LineNumber:
        PropertyKind: Input
        DisplayName: LineNumber
        Description: Production line number
        DataType: Text
        Default: =varCurrentWorkOrder.LineNumber
      NetFillWeight:
        PropertyKind: Input
        DisplayName: NetFillWeight
        Description: Net fill weight
        DataType: Text
        Default: =varCurrentProduct.NetFillWeight_g
      OnCancelSetupPressed:
        PropertyKind: Event
        DisplayName: OnCancelSetupPressed
        Description: Fires when CANCEL SETUP is pressed - navigate back
        ReturnType: Boolean
        Default: |-
          =Set(varSetupTime, "");
                                  Navigate(Production_Start, ScreenTransition.None)
      OnReportFailurePressed:
        PropertyKind: Event
        DisplayName: OnReportFailurePressed
        Description: Fires when REPORT FAILURE is pressed
        ReturnType: Boolean
        Default: |
          =Navigate(Failure_Type, ScreenTransition.None)
      OnSetupCompletePressed:
        PropertyKind: Event
        DisplayName: OnSetupCompletePressed
        Description: Fires when SETUP COMPLETE - GO LIVE is pressed
        ReturnType: Boolean
        Default: =Navigate(Production_Start, ScreenTransition.None)
      OnViewJobInfoPressed:
        PropertyKind: Event
        DisplayName: OnViewJobInfoPressed
        Description: Fires when VIEW JOB INFO is pressed
        ReturnType: Boolean
        Default: =Navigate(WorkOrder1, ScreenTransition.None)
      ProductName:
        PropertyKind: Input
        DisplayName: ProductName
        Description: Product name
        DataType: Text
        Default: =varCurrentProduct.Title
      QtyRequired:
        PropertyKind: Input
        DisplayName: QtyRequired
        Description: Required quantity
        DataType: Text
        Default: =Text(varCurrentWorkOrder.QtyRequired) & " Units"
      SetupStartTime:
        PropertyKind: Input
        DisplayName: SetupStartTime
        Description: Time setup was started
        DataType: Text
        Default: =varSetupTime
      Tube:
        PropertyKind: Input
        DisplayName: Tube
        Description: Tube code
        DataType: Text
        Default: =varCurrentProduct.Tube
    Properties:
      Height: =614
      Width: =1024
    Children:
      - cont_root_sp:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(26, 26, 26, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =6
            Width: =Parent.Width
          Children:
            - cont_header_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(200, 140, 0, 1)
                  FillPortions: =0
                  Height: =47
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =0
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_badge_sp:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 220, 100, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =47
                        Size: =11
                        Text: ="⚙ SETUP IN PROGRESS"
                        Width: =220
                  - lbl_title_sp:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =47
                        Size: =15
                        Text: =SetupInProgress.LineNumber & " — " & SetupInProgress.JobOrder
                  - lbl_starttime_sp:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        Color: =RGBA(160, 210, 210, 1)
                        Font: =Font.'Open Sans'
                        Height: =47
                        Size: =11
                        Text: ="Started " & SetupInProgress.SetupStartTime
                        Width: =140
            - cont_product_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(30, 50, 35, 1)
                  FillPortions: =0
                  Height: =68
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  Width: =Parent.Width
                Children:
                  - lbl_product_label_sp:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(120, 200, 140, 1)
                        Font: =Font.'Open Sans'
                        Height: =68
                        Size: =11
                        Text: ="PRODUCT"
                        Width: =80
                  - lbl_product_val_sp:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(255, 255, 255, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =68
                        Size: =20
                        Text: =SetupInProgress.ProductName
            - cont_metrics_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =130
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  Width: =Parent.Width
                Children:
                  - cont_batch_sp:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =12
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =12
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_batch_key_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =22
                              Size: =11
                              Text: ="BATCH"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_batch_val_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(83, 178, 200, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =88
                              Size: =28
                              Text: =SetupInProgress.Batch
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_qty_sp:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =12
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =12
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_qty_key_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =22
                              Size: =11
                              Text: ="QTY REQUIRED"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_qty_val_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(83, 178, 200, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =88
                              Size: =28
                              Text: =SetupInProgress.QtyRequired
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_netfill_sp:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(36, 36, 36, 1)
                        Height: =130
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =12
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =12
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                      Children:
                        - lbl_netfill_key_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(120, 120, 120, 1)
                              Font: =Font.'Open Sans'
                              Height: =22
                              Size: =11
                              Text: ="NET FILL WEIGHT"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_netfill_val_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(230, 230, 230, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =88
                              Size: =22
                              Text: =SetupInProgress.NetFillWeight
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_tube_row_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =72
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  Width: =Parent.Width
                Children:
                  - cont_tube_sp:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(30, 30, 30, 1)
                        Height: =72
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =8
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                      Children:
                        - lbl_tube_key_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(110, 110, 110, 1)
                              Font: =Font.'Open Sans'
                              Height: =18
                              Size: =10
                              Text: ="TUBE"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_tube_val_sp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(210, 210, 210, 1)
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =38
                              Size: =16
                              Text: =SetupInProgress.Tube
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_sec_actions_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =88
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                  Width: =Parent.Width
                Children:
                  - btn_report_failure_sp:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(200, 140, 0, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(200, 140, 0, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(200, 140, 0, 1), -20%)
                        OnSelect: =SetupInProgress.OnReportFailurePressed()
                        PressedFill: =ColorFade(RGBA(200, 140, 0, 1), -35%)
                        Size: =16
                        Text: ="⚠ REPORT FAILURE"
                  - btn_view_jobinfo_sp:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(20, 50, 90, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(20, 50, 90, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Normal
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(20, 50, 90, 1), -20%)
                        OnSelect: =SetupInProgress.OnViewJobInfoPressed()
                        PressedFill: =ColorFade(RGBA(20, 50, 90, 1), -35%)
                        Size: =16
                        Text: ="VIEW JOB INFO"
            - cont_main_actions_sp:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =112
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =12
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                  Width: =Parent.Width
                Children:
                  - btn_cancel_setup_sp:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(22, 75, 80, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(22, 75, 80, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(22, 75, 80, 1), -20%)
                        OnSelect: =SetupInProgress.OnCancelSetupPressed()
                        PressedFill: =ColorFade(RGBA(22, 75, 80, 1), -35%)
                        Size: =18
                        Text: ="CANCEL SETUP"
                  - btn_setup_complete_sp:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(46, 182, 143, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(46, 182, 143, 1)
                        FillPortions: =2
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(46, 182, 143, 1), -20%)
                        OnSelect: =SetupInProgress.OnSetupCompletePressed()
                        PressedFill: =ColorFade(RGBA(46, 182, 143, 1), -35%)
                        Size: =18
                        Text: ="SETUP COMPLETE — GO LIVE"
