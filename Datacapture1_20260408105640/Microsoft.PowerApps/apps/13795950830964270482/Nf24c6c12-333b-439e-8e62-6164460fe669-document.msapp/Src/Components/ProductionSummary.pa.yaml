ComponentDefinitions:
  ProductionSummary:
    DefinitionType: CanvasComponent
    CustomProperties:
      Batch:
        PropertyKind: Input
        DisplayName: Batch
        Description: Codigo de batch
        DataType: Text
        Default: ="C1349 / C02"
      FinishedFillWeight:
        PropertyKind: Input
        DisplayName: FinishedFillWeight
        Description: Peso final registrado
        DataType: Text
        Default: ="116.8g"
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Numero de orden de trabajo
        DataType: Text
        Default: ="2GE0009"
      LineNumber:
        PropertyKind: Input
        DisplayName: LineNumber
        Description: Numero de la linea
        DataType: Text
        Default: ="Line 2"
      NetFillWeight:
        PropertyKind: Input
        DisplayName: NetFillWeight
        Description: Rango de peso neto objetivo
        DataType: Text
        Default: ="115g - 118g"
      OnCloseJobPressed:
        PropertyKind: Event
        DisplayName: OnCloseJobPressed
        Description: Se dispara al presionar CLOSE JOB - accion final
        ReturnType: Boolean
        Default: =false
      ProductName:
        PropertyKind: Input
        DisplayName: ProductName
        Description: Nombre del producto
        DataType: Text
        Default: ="No Nasties Hair Paste"
      ProductionEndTime:
        PropertyKind: Input
        DisplayName: ProductionEndTime
        Description: Hora de fin de produccion
        DataType: Text
        Default: ="21:15"
      ProductionStartTime:
        PropertyKind: Input
        DisplayName: ProductionStartTime
        Description: Hora de inicio de produccion
        DataType: Text
        Default: ="14:32"
      QtyRequired:
        PropertyKind: Input
        DisplayName: QtyRequired
        Description: Cantidad requerida objetivo
        DataType: Number
        Default: =5000
      Rejects:
        PropertyKind: Input
        DisplayName: Rejects
        Description: Total de unidades rechazadas
        DataType: Number
        Default: =12
      RetentionSamples:
        PropertyKind: Input
        DisplayName: RetentionSamples
        Description: Muestras de retencion tomadas
        DataType: Text
        Default: ="1 start / 1 mid / 1 end"
      TotalDowntime:
        PropertyKind: Input
        DisplayName: TotalDowntime
        Description: Tiempo total de downtime registrado
        DataType: Text
        Default: ="0h 28m"
      TotalDuration:
        PropertyKind: Input
        DisplayName: TotalDuration
        Description: Duracion total calculada
        DataType: Text
        Default: ="6h 43m"
      UnitsProduced:
        PropertyKind: Input
        DisplayName: UnitsProduced
        Description: Total de unidades producidas
        DataType: Number
        Default: =4820
