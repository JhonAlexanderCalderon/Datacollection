ComponentDefinitions:
  WorkOrderScreen2:
    DefinitionType: CanvasComponent
    CustomProperties:
      Cap:
        PropertyKind: Input
        DisplayName: Cap
        Description: Tipo de tapa
        DataType: Text
        Default: ="N/A"
      CartonQty:
        PropertyKind: Input
        DisplayName: CartonQty
        Description: Cantidad por caja
        DataType: Text
        Default: ="6 units (6 x SRTs)"
      CartonType:
        PropertyKind: Input
        DisplayName: CartonType
        Description: Tipo de caja
        DataType: Text
        Default: ="3OGE0002 master carton"
      FillTime:
        PropertyKind: Input
        DisplayName: FillTime
        Description: Tiempo de llenado
        DataType: Text
        Default: ="TBC"
      FinishedFillWeight:
        PropertyKind: Input
        DisplayName: FinishedFillWeight
        Description: Peso terminado de llenado
        DataType: Text
        Default: ="TBC"
      JobOrder:
        PropertyKind: Input
        DisplayName: JobOrder
        Description: Numero de orden de trabajo
        DataType: Text
        Default: ="2GE0009"
      OnBackPressed:
        PropertyKind: Event
        DisplayName: OnBackPressed
        Description: Se dispara al presionar BACK
        ReturnType: Boolean
        Default: =false
      OnStartJobPressed:
        PropertyKind: Event
        DisplayName: OnStartJobPressed
        Description: Se dispara al presionar START JOB
        ReturnType: Boolean
        Default: =false
      ProductName:
        PropertyKind: Input
        DisplayName: ProductName
        Description: Nombre del producto
        DataType: Text
        Default: ="No Nasties Hair Paste"
      RetentionSamples:
        PropertyKind: Input
        DisplayName: RetentionSamples
        Description: Numero de muestras de retencion
        DataType: Text
        Default: ="1 at start, 1 at middle, 1 at end"
      WeighCheckFrequency:
        PropertyKind: Input
        DisplayName: WeighCheckFrequency
        Description: Frecuencia del weigh check en minutos
        DataType: Text
        Default: ="15 min"
