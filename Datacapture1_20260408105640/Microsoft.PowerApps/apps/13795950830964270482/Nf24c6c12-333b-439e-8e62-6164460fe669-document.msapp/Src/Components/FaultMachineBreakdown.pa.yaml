                        BorderThickness: =If(varFaultDetail="Conveyor / Motor", 3, 0)
                        DropShadow: =DropShadow.None
                        Fill: =If(varFaultDetail="Conveyor / Motor", RGBA(200, 140, 0, 1), RGBA(60, 40, 0, 1))
                        Height: =170
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =14
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =14
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                      Children:
                        - img_conveyor_mb:
                            Control: Image@2.2.3
                            Properties:
                              Height: =90
                              Image: ="data:image/svg+xml;utf8," & EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83'/></svg>")
