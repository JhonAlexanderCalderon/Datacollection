                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =52
                              OnSelect: =Set(varFaultDetail, "Mechanical Jam")
                              Size: =14
                              Text: ="Mechanical Jam"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_taperbottom_mb:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        BorderColor: =If(varFaultDetail="Taper Bottom Fault", RGBA(255, 255, 255, 1), RGBA(0, 0, 0, 0))
                        BorderThickness: =If(varFaultDetail="Taper Bottom Fault", 3, 0)
                        DropShadow: =DropShadow.None
                        Fill: =If(varFaultDetail="Taper Bottom Fault", RGBA(200, 140, 0, 1), RGBA(60, 40, 0, 1))
                        Height: =170
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =14
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =14
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                      Children:
                        - img_taperbottom_mb:
                            Control: Image@2.2.3
                            Properties:
                              Height: =90
                              Image: ="data:image/svg+xml;utf8," & EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'/><line x1='12' y1='22' x2='12' y2='12'/><line x1='3' y1='7' x2='12' y2='12'/><line x1='21' y1='7' x2='12' y2='12'/><line x1='8' y1='20' x2='8' y2='10'/></svg>")
                              ImagePosition: =ImagePosition.Center
                              OnSelect: =Set(varFaultDetail, "Taper Bottom Fault")
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_taperbottom_mb:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =52
                              OnSelect: =Set(varFaultDetail, "Taper Bottom Fault")
                              Size: =14
                              Text: ="Taper Bottom Fault"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_row2_mb:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =170
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  Width: =Parent.Width
                Children:
                  - cont_conveyor_mb:
