                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        BorderColor: =If(varFaultDetail="Sensor Fault", RGBA(255, 255, 255, 1), RGBA(0, 0, 0, 0))
                        BorderThickness: =If(varFaultDetail="Sensor Fault", 3, 0)
                        DropShadow: =DropShadow.None
                        Fill: =If(varFaultDetail="Sensor Fault", RGBA(200, 140, 0, 1), RGBA(60, 40, 0, 1))
                        Height: =170
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =14
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =14
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                      Children:
                        - img_sensor_mb:
                            Control: Image@2.2.3
                            Properties:
                              Height: =90
                              Image: ="data:image/svg+xml;utf8," & EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12s2.545-5 7-5c4.454 0 7 5 7 5s-2.546 5-7 5c-4.455 0-7-5-7-5z'/><circle cx='12' cy='12' r='3'/><path d='M12 5v2M12 17v2M5 12H3M21 12h-2'/></svg>")
                              ImagePosition: =ImagePosition.Center
                              OnSelect: =Set(varFaultDetail, "Sensor Fault")
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_sensor_mb:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =52
                              OnSelect: =Set(varFaultDetail, "Sensor Fault")
                              Size: =14
                              Text: ="Sensor Fault"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_maintenance_mb:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        BorderColor: =If(varFaultDetail="Maintenance Required", RGBA(255, 255, 255, 1), RGBA(0, 0, 0, 0))
