                            Properties:
                              Align: =Align.Center
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =52
                              OnSelect: =Set(varFaultDetail, "Maintenance Required")
                              Size: =14
                              Text: ="Maintenance Required"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_note_mb:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =99
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  PaddingBottom: =6
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =6
                  Width: =Parent.Width
                Children:
                  - lbl_note_key_mb:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(120, 120, 120, 1)
                        Font: =Font.'Open Sans'
                        Height: =20
                        Size: =11
                        Text: ="NOTES (optional)"
                        Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - txt_note_mb:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(60, 60, 60, 1)
                        BorderThickness: =1
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(36, 36, 36, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        Height: =61
                        HintText: ="Add details about the fault..."
                        HoverBorderColor: =RGBA(200, 140, 0, 1)
                        Mode: =TextMode.MultiLine
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
            - cont_actions_mb:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(26, 26, 26, 1)
                  FillPortions: =0
                  Height: =64
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =8
                  Width: =Parent.Width
                Children:
                  - btn_cancel_mb:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(22, 75, 80, 1)
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(22, 75, 80, 1)
                        FillPortions: =1
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(22, 75, 80, 1), -20%)
                        OnSelect: =Set(varFaultDetail, "") ;FaultMachineBreakdown.OnCancelPressed()
                        PressedFill: =ColorFade(RGBA(22, 75, 80, 1), -35%)
                        Size: =16
                        Text: ="CANCEL"
                  - btn_confirm_mb:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =If(IsBlank(varFaultDetail), RGBA(80, 55, 0, 1), RGBA(200, 140, 0, 1))
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        DisplayMode: =If(IsBlank(varFaultDetail), DisplayMode.Disabled, DisplayMode.Edit)
                        Fill: =If(IsBlank(varFaultDetail), RGBA(80, 55, 0, 1), RGBA(200, 140, 0, 1))
                        FillPortions: =2
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Bold
                        Height: =Parent.Height-Parent.PaddingTop-Parent.PaddingBottom
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(200, 140, 0, 1), -20%)
                        OnSelect: =FaultMachineBreakdown.OnConfirmPressed()
                        PressedFill: =ColorFade(RGBA(200, 140, 0, 1), -35%)
                        Size: =16
                        Text: ="LOG MACHINE BREAKDOWN"
