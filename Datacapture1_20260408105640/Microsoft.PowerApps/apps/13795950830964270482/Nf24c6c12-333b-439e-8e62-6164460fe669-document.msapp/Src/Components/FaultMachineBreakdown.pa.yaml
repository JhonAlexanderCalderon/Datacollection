                            Control: Image@2.2.3
                            Properties:
                              Height: =90
                              Image: ="data:image/svg+xml;utf8," & EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z'/><line x1='12' y1='19' x2='12' y2='22'/><line x1='19' y1='12' x2='22' y2='12'/></svg>")
                              ImagePosition: =ImagePosition.Center
                              OnSelect: =Set(varFaultDetail, "Maintenance Required")
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                        - lbl_maintenance_mb:
