                              Align: =Align.Center
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Bold
                              Height: =52
                              OnSelect: =Set(varFaultDetail, "Conveyor / Motor")
                              Size: =14
                              Text: ="Conveyor / Motor"
                              Width: =Parent.Width-Parent.PaddingLeft-Parent.PaddingRight
                  - cont_sensor_mb:
