Screens:
  WorkOrder2:
    Properties:
      Fill: =MainBackground
      ImagePosition: =ImagePosition.Center
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(varBatchText, "")
    Children:
      - WorkOrderScreen2_1:
          Control: CanvasComponent
          ComponentName: WorkOrderScreen2
          Properties:
            Cap: =varCurrentProduct.CapType
            CartonQty: =varCurrentProduct.CartonQty
            CartonType: =varCurrentProduct.CartonType
            FillTime: =varCurrentProduct.FillTime
            FinishedFillWeight: =varCurrentProduct.FinishedFillWeight
            Height: =614
            JobOrder: =varCurrentWorkOrder.Title
            OnBackPressed: =Navigate(WorkOrder1, ScreenTransition.None)
            OnStartJobPressed: =Navigate(OpAssignment, ScreenTransition.None)
            ProductName: =varCurrentProduct.ProductName
            RetentionSamples: =varCurrentProduct.RetentionSamples
            WeighCheckFrequency: =varCurrentProduct.WeighCheckFrequency_min
            Width: =1024
