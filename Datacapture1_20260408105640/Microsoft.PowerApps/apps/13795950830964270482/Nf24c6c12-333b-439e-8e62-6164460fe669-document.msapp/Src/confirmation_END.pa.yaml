Screens:
  confirmation_END:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - EndProductionConfirm_1:
          Control: CanvasComponent
          ComponentName: EndProductionConfirm
          Properties:
            Height: =614
            JobOrder: ="2GE0009"
            LineNumber: ="Line 2"
            OnCancelPressed: =Navigate(LiveProd, ScreenTransition.None)
            OnEndJobPressed: |-
              =Patch('Active Sessions', varActiveSession,
                                    {Status: {Value: "Paused"},
                                     LastModified: Text(Now(), "dd/mm/yyyy hh:mm")});
                                  Set(varActiveSession, Blank());
                                  Set(varJobID, "");
                                  Set(varUnitsTotal, 0);
                                  Set(varRejectsTotal, 0);
                                  Set(varSetupTime, "");
                                  Set(varPinCode, "");
                                  Navigate(Numbers, ScreenTransition.None);
                                  Navigate(Production_Summary, ScreenTransition.None)
            OnPauseJobPressed: |-
              =Patch('Active Sessions', varActiveSession,
                                    {Status: {Value: "Paused"},
                                     LastModified: Text(Now(), "dd/mm/yyyy hh:mm")});
                                  Set(varActiveSession, Blank());
                                  Set(varJobID, "");
                                  Set(varUnitsTotal, 0);
                                  Set(varRejectsTotal, 0);
                                  Set(varSetupTime, "");
                                  Set(varPinCode, "");
                                  Navigate(Numbers, ScreenTransition.None)
            ProductName: ="No Nasties Hair Paste"
            ProductionStartTime: ="14:32"
            Rejects: ="12"
            UnitsProduced: ="4820"
            Width: =1024
